<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Job Portal</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark px-4">
        <span class="navbar-brand">Admin Dashboard</span>
        <div class="text-white">
            Hello, Admin
            <button class="btn btn-danger btn-sm ms-3" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container my-5">

        <!-- POST JOB -->
        <div class="row">
            <div class="col-md-6">
                <form id="postJobForm" class="card p-4 shadow-sm">
                    <h4 class="mb-3">Post New Job</h4>

                    <div class="mb-3">
                        <label class="form-label">Job Title</label>
                        <input type="text" id="jobTitle" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Company Name</label>
                        <input type="text" id="companyName" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Location</label>
                        <input type="text" id="jobLocation" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Job Description</label>
                        <textarea id="jobDescription" class="form-control" rows="4" required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                    Post Job
                </button>
                </form>
            </div>

            <!-- MANAGE JOBS -->
            <div class="col-md-6">
                <div class="card p-4 shadow-sm">
                    <h4 class="mb-3">Manage Jobs</h4>

                    <table class="table table-bordered">
                        <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Job Title</th>
                                <th>Company</th>
                                <th>Location</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="adminJobList"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Jobs Script -->
    <script src="jobs.js"></script>

    <script>
        function logout() {
            localStorage.removeItem("loggedInUser");
            window.location.href = "index.html";
        }
    </script>
    <script src="jobs.js"></script>

</body>

</html>
