<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Employer Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <h2 class="text-primary mb-4">Employer Profile</h2>

        <div class="card p-4">
            <div class="mb-3">
                <label>Company Name</label>
                <input type="text" id="companyName" class="form-control">
            </div>

            <div class="mb-3">
                <label>Company Email</label>
                <input type="email" id="companyEmail" class="form-control">
            </div>

            <div class="mb-3">
                <label>Contact Number</label>
                <input type="text" id="companyPhone" class="form-control">
            </div>

            <div class="mb-3">
                <label>Company Address</label>
                <textarea id="companyAddress" class="form-control"></textarea>
            </div>

            <div class="mb-3">
                <label>About Company</label>
                <textarea id="companyAbout" class="form-control"></textarea>
            </div>

            <button class="btn btn-primary" onclick="saveEmployer()">Save Profile</button>
        </div>
    </div>

    <script>
        function saveEmployer() {
            const profile = {
                companyName: companyName.value,
                companyEmail: companyEmail.value,
                companyPhone: companyPhone.value,
                companyAddress: companyAddress.value,
                companyAbout: companyAbout.value
            };

            localStorage.setItem("employerProfile", JSON.stringify(profile));
            alert("Employer profile saved!");
        }

        window.onload = () => {
            const data = JSON.parse(localStorage.getItem("employerProfile"));
            if (data) {
                companyName.value = data.companyName;
                companyEmail.value = data.companyEmail;
                companyPhone.value = data.companyPhone;
                companyAddress.value = data.companyAddress;
                companyAbout.value = data.companyAbout;
            }
        };
    </script>

</body>

</html>
