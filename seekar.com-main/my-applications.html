<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>My Applications | Job Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-primary">
        <div class="container d-flex justify-content-between">
            <a class="navbar-brand fw-bold" href="index.html">Job Portal</a>
            <a href="index.html" class="btn btn-light">Home</a>
        </div>
    </nav>

    <div class="container my-5">
        <h3 class="text-center text-primary mb-4">My Applied Jobs</h3>

        <div id="applicationList"></div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem("loggedInUser"));

        // 🔐 CANDIDATE ONLY ACCESS
        if (!user || user.role !== "candidate") {
            alert("Only candidates can view applied jobs");
            window.location.href = "login.html";
        }

        const applications = JSON.parse(localStorage.getItem("applications")) || [];
        const applicationList = document.getElementById("applicationList");

        // FILTER APPLICATIONS BY LOGGED-IN CANDIDATE EMAIL
        const myApplications = applications.filter(app =>
            app.email === user.email
        );

        if (myApplications.length === 0) {
            applicationList.innerHTML = `
                <p class="text-center text-muted">
                    You have not applied for any jobs yet
                </p>
            `;
        } else {
            myApplications.forEach(app => {
                applicationList.innerHTML += `
                    <div class="card p-3 shadow mb-3">
                        <h5>${app.jobTitle}</h5>
                        <p><b>Company:</b> ${app.company || "N/A"}</p>
                        <p><b>Status:</b>
                            <span class="badge bg-warning">Applied</span>
                        </p>
                    </div>
                `;
            });
        }
    </script>

</body>

</html>
