<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Manage Jobs | Job Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary">
        <div class="container d-flex justify-content-between">
            <a class="navbar-brand fw-bold" href="index.html">Job Portal</a>
            <a href="post-job.html" class="btn btn-light">Post Job</a>
        </div>
    </nav>

    <div class="container my-5">
        <h3 class="text-center text-primary mb-4">My Job Listings</h3>
        <div id="jobList"></div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem("loggedInUser"));

        if (!user || !user.role || user.role.toLowerCase() !== "employer") {
            alert("Unauthorized access");
            window.location.href = "login.html";
        }

        let jobs = JSON.parse(localStorage.getItem("jobs")) || [];
        const jobList = document.getElementById("jobList");

        function loadJobs() {
            jobList.innerHTML = "";

            const myJobs = jobs.filter(j => j.email === user.email);

            if (myJobs.length === 0) {
                jobList.innerHTML = "<p class='text-center'>No jobs posted yet</p>";
                return;
            }

            myJobs.forEach(job => {
                jobList.innerHTML += `
                <div class="card p-3 mb-3 shadow">
                    <h5>${job.title}</h5>
                    <p><b>Location:</b> ${job.location}</p>
                    <p><b>Salary:</b> ${job.salary}</p>

                    <p><b>Description:</b> ${job.description}</p>
                    <p><b>Responsibilities:</b> ${job.responsibilities}</p>
                    <p><b>Qualifications:</b> ${job.qualifications}</p>

                    <div class="d-flex gap-2">
                        <button class="btn btn-warning btn-sm" onclick="editJob(${job.id})">Edit</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteJob(${job.id})">Delete</button>
                    </div>
                </div>
                `;
            });
        }

        function deleteJob(id) {
            if (!confirm("Delete this job?")) return;

            jobs = jobs.filter(j => j.id !== id);
            localStorage.setItem("jobs", JSON.stringify(jobs));
            loadJobs();
        }

        function editJob(id) {
            const job = jobs.find(j => j.id === id);
            localStorage.setItem("editJob", JSON.stringify(job));
            window.location.href = "post-job.html";
        }

        loadJobs();
    </script>

</body>

</html>
