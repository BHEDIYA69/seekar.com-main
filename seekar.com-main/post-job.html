<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Post Job | Job Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary">
        <div class="container d-flex justify-content-between">
            <a class="navbar-brand fw-bold" href="index.html">Job Portal</a>
            <a href="manage-jobs.html" class="btn btn-light">Manage Jobs</a>
        </div>
    </nav>

    <div class="container my-5">
        <div class="card shadow p-4">
            <h3 class="text-center text-primary mb-4">Post a New Job</h3>

            <form id="jobForm">
                <input type="text" id="title" class="form-control mb-3" placeholder="Job Title" required>
                <textarea id="description" class="form-control mb-3" placeholder="Job Description" required></textarea>
                <textarea id="responsibilities" class="form-control mb-3" placeholder="Responsibilities"></textarea>
                <textarea id="qualifications" class="form-control mb-3" placeholder="Qualifications"></textarea>
                <input type="text" id="location" class="form-control mb-3" placeholder="Location" required>
                <input type="text" id="salary" class="form-control mb-3" placeholder="Salary Range">

                <select id="type" class="form-control mb-4">
                <option>Full Time</option>
                <option>Hybrid</option>
                <option>Remote</option>
            </select>

                <button class="btn btn-primary w-100">Post Job</button>
            </form>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem("loggedInUser"));

        if (!user || !user.role || user.role.toLowerCase() !== "employer") {
            alert("Only Employer can post jobs");
            window.location.href = "login.html";
        }

        document.getElementById("jobForm").addEventListener("submit", function(e) {
            e.preventDefault();

            let jobs = JSON.parse(localStorage.getItem("jobs")) || [];

            jobs.push({
                id: Date.now(),
                employer: user.name,
                email: user.email,
                title: title.value,
                description: description.value,
                responsibilities: responsibilities.value,
                qualifications: qualifications.value,
                location: location.value,
                salary: salary.value,
                type: type.value
            });

            localStorage.setItem("jobs", JSON.stringify(jobs));
            alert("Job posted successfully!");
            window.location.href = "manage-jobs.html";
        });
    </script>

</body>

</html>
