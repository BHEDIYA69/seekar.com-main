<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow p-4">
            <h3 class="mb-4">Job Seeker Profile</h3>
            <div class="text-center mb-4">
                <img id="profilePreview" src="https://via.placeholder.com/120" class="rounded-circle mb-2" width="120" height="120">

                <input type="file" id="profilePic" class="form-control mt-2" accept="image/*">
            </div>


            <form id="profileForm">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Full Name</label>
                        <input type="text" id="fullName" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Email</label>
                        <input type="email" id="email" class="form-control" readonly>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Phone</label>
                        <input type="text" id="phone" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Location</label>
                        <input type="text" id="location" class="form-control">
                    </div>

                    <div class="col-md-12 mb-3">
                        <label>Skills</label>
                        <input type="text" id="skills" class="form-control" placeholder="HTML, CSS, JS">
                    </div>

                    <div class="col-md-12 mb-3">
                        <label>About Me</label>
                        <textarea id="about" class="form-control" rows="3"></textarea>
                    </div>

                    <div class="col-md-12 mb-3">
                        <label>Upload Resume (PDF/DOC)</label>
                        <input type="file" id="resume" class="form-control" accept=".pdf,.doc,.docx">
                        <small id="resumeName" class="text-success"></small>
                    </div>
                </div>

                <button class="btn btn-primary w-100">Save Profile</button>
            </form>
        </div>
    </div>

    <script src="profile.js"></script>
    <script src="profile.js"></script>

</body>

</html>
